<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Formatter</title>
    <style>
        /* Modern CSS Reset & Flexbox Layout for sticky footer */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body { 
            font-family: sans-serif; 
            background: #f4f4f9; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* Main wrapper takes up all available space, pushing footer down */
        .main-content {
            flex: 1 0 auto;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
        }

        #inputBox { width: 100%; height: 80px; background: #d4edda; border: 2px solid #28a745; padding: 10px; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; resize: vertical; }
        .btn-format { width: 100%; padding: 12px; background: #28a745; color: white; border: none; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-bottom: 20px; transition: 0.2s; }
        .btn-format:hover { background: #218838; }
        .row { display: flex; align-items: center; margin-bottom: 10px; padding: 10px; background: #e2e3e5; border-radius: 5px; transition: 0.3s; }
        .row.done { background: #cce5ff; }
        .row.done span { text-decoration: line-through; color: #004085; }
        .number-label { font-weight: bold; margin-right: 10px; min-width: 25px; }
        input[type="checkbox"] { margin-right: 15px; transform: scale(1.5); cursor: pointer; }
        span { font-family: monospace; font-size: 18px; letter-spacing: 1px; }

        /* Mobile-Sticky Footer Styles */
        .custom-footer {
            flex-shrink: 0; /* Prevents the footer from shrinking */
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 20px 10px;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            letter-spacing: 0.5px;
            border-top: 3px solid #28a745; 
            width: 100%;
            box-sizing: border-box;
        }
        .footer-text {
            margin: 0 0 8px 0;
            font-weight: 500;
            opacity: 0.9;
        }
        .footer-email {
            color: #28a745;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease, border-bottom 0.3s ease;
            border-bottom: 1px solid transparent;
            display: inline-block;
        }
        .footer-email:hover {
            color: #34ce57;
            border-bottom: 1px solid #34ce57;
        }
        .footer-text span {
            color: #e74c3c;
        }
    </style>
</head>
<body>

<div class="main-content">
    <h3>Enter 240 Digits</h3>
    <textarea id="inputBox" oninput="processDigits()" placeholder="Paste 240 digits here..." maxlength="2000"></textarea> 
    <div id="outputArea"></div>
</div>

<footer class="custom-footer">
    <p class="footer-text">Made with AI by a human 👤</p>
    <a href="mailto:fatman786@proton.me" class="footer-email">fatman786@proton.me</a>
</footer>

<script>
    function processDigits() {
        var input = document.getElementById('inputBox');
        var output = document.getElementById('outputArea');
        
        var val = input.value.replace(/\D/g, '');
        
        if (val.length > 240) {
            val = val.slice(0, 240);
        }
        
        output.innerHTML = '';
        if (val === '') {
            return;
        }
        
        var htmlContent = '';
        var rowNumber = 1;
        
        for (var i = 0; i < val.length; i += 20) {
            var chunk = val.slice(i, i + 20);
            
            var formattedChunk = '';
            for (var j = 0; j < chunk.length; j += 4) {
                formattedChunk += chunk.slice(j, j + 4) + ' ';
            }
            formattedChunk = formattedChunk.trim();
            
            htmlContent += '<div class="row" id="row-' + rowNumber + '">';
            htmlContent += '  <div class="number-label">' + rowNumber + '.</div>';
            htmlContent += '  <input type="checkbox" onchange="toggleRow(this)">';
            htmlContent += '  <span>' + formattedChunk + '</span>';
            htmlContent += '</div>';
            
            rowNumber++;
        }
        
        output.innerHTML = htmlContent;
    }

    function toggleRow(checkboxElement) {
        var parentRow = checkboxElement.parentElement;
        if (checkboxElement.checked) {
            parentRow.className = 'row done';
        } else {
            parentRow.className = 'row';
        }
    }
</script>

</body>
</html>
